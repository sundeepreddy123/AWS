apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: webapp

  template:
    metadata:
      labels:
        app: webapp

    spec:
      containers:
      - name: nginx
        image: nginx:latest

        ports:
        - containerPort: 80