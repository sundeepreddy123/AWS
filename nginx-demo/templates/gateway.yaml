apiVersion: networking.istio.io/v1

kind: Gateway

metadata:

  name: {{ .Values.gateway.name }}

spec:

  selector:

    istio: ingressgateway

  servers:

  - port:

      number: 80

      name: http

      protocol: HTTP

    hosts:

    - "*"

  - port:

      number: 443

      name: https

      protocol: HTTPS

    tls:
      mode: SIMPLE
      credentialName: istio-ingressgateway-certs

    hosts:

    - "*"