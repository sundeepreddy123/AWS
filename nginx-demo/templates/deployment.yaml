{{- range .Values.applications }}

apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ .name }}

spec:

  replicas: {{ .replicas }}

  selector:

    matchLabels:

      app: {{ .name }}

  template:

    metadata:

      labels:

        app: {{ .name }}

    spec:

      containers:

      - name: nginx

        image: {{ .image }}:{{ .tag }}

        ports:

        - containerPort: 80

        volumeMounts:

        - name: html

          mountPath: /usr/share/nginx/html/index.html

          subPath: index.html

      volumes:

      - name: html

        configMap:

          name: {{ .name }}

---

{{- end }}