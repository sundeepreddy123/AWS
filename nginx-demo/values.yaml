applications:

  - name: public-app

    image: nginx

    tag: latest

    replicas: 1

    servicePort: 80

    path: /public

    html: |
      <h1>Public Application</h1>

  - name: private-app

    image: nginx

    tag: latest

    replicas: 1

    servicePort: 80

    path: /private

    html: |
      <h1>Private Application</h1>

gateway:

  name: external-gateway